server {
    listen 80;
    server_name proficonq.com www.proficonq.com;

    root /var/www/proficonq;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|png|svg|jpg|jpeg|gif|ico|woff2?|pdf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API proxy (если нужен бэкенд)
    # location /api/ {
    #     proxy_pass http://127.0.0.1:3000;
    # }

    # SPA — все пути отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
