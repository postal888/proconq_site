            <div class="profile-setting-block">
              <div class="profile-setting-label" data-i18n="profile.translationLangs">Card &amp; subtitle languages</div>
              <p class="profile-setting-desc" data-i18n="profile.translationLangsHint">Choose 2 languages.</p>
              <div class="profile-chip-row profile-chip-row--compact" id="profile-translation-from-chips" role="group">
                <button type="button" class="profile-chip" data-value="0" onclick="profileSetTranslationFromLang(0)">PT</button>
                <button type="button" class="profile-chip" data-value="1" onclick="profileSetTranslationFromLang(1)">EN</button>
                <button type="button" class="profile-chip" data-value="2" onclick="profileSetTranslationFromLang(2)">RU</button>
              </div>
              <div class="profile-chip-row profile-chip-row--compact" id="profile-translation-to-chips" role="group" style="margin-top:8px">
                <button type="button" class="profile-chip" data-value="0" onclick="profileSetTranslationTargetLang(0)">PT</button>
                <button type="button" class="profile-chip" data-value="1" onclick="profileSetTranslationTargetLang(1)">EN</button>
                <button type="button" class="profile-chip" data-value="2" onclick="profileSetTranslationTargetLang(2)">RU</button>
              </div>
            </div>
